name: Release Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Dry run (no actual release)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '18'
  CACHE_DEPENDENCY_PATH: 'package-lock.json'

jobs:
  # Validate commits and changelog
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for conventional commits

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}

    - name: Install dependencies
      run: npm ci

    - name: Validate commit messages
      if: github.event_name == 'pull_request'
      run: |
        npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

    - name: Validate changelog format
      run: node scripts/generate-changelog.js validate

  # Build and test
  build-and-test:
    runs-on: ubuntu-latest
    needs: validate

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}

    - name: Install dependencies
      run: npm ci

    - name: Run linting
      run: npm run lint

    - name: Run tests
      run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage

    - name: Build library
      run: npm run build:lib

    - name: Build demo application
      run: npm run build:demo

    - name: Upload coverage reports
      if: matrix.node-version == 18
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella

  # Automated release (only on main branch)
  release:
    runs-on: ubuntu-latest
    needs: [validate, build-and-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm ci

    - name: Configure git
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Determine release type
      id: release-type
      run: |
        # Analyze commits since last release to determine release type
        COMMITS=$(git log $(git describe --tags --abbrev=0)..HEAD --oneline || git log --oneline)

        if echo "$COMMITS" | grep -q "BREAKING CHANGE\|feat!:\|fix!:"; then
          echo "type=major" >> $GITHUB_OUTPUT
        elif echo "$COMMITS" | grep -q "feat:"; then
          echo "type=minor" >> $GITHUB_OUTPUT
        else
          echo "type=patch" >> $GITHUB_OUTPUT
        fi

    - name: Generate changelog and release
      id: generate-release
      run: |
        RELEASE_TYPE="${{ steps.release-type.outputs.type }}"
        echo "Creating $RELEASE_TYPE release"

        # Run release script
        node scripts/release.js $RELEASE_TYPE --skip-publish

        # Get the new version
        NEW_VERSION=$(node -p "require('./package.json').version")
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

        # Generate release notes
        node scripts/generate-release-notes.js $NEW_VERSION

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.generate-release.outputs.version }}
        release_name: Release v${{ steps.generate-release.outputs.version }}
        body_path: ./RELEASE_NOTES.md
        draft: false
        prerelease: false

    - name: Publish to NPM
      run: npm run release:publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Manual release workflow
  manual-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm ci

    - name: Configure git
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Manual release
      run: |
        RELEASE_TYPE="${{ github.event.inputs.release_type }}"
        DRY_RUN_FLAG=""

        if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
          DRY_RUN_FLAG="--dry-run"
        fi

        echo "Creating $RELEASE_TYPE release"
        node scripts/release.js $RELEASE_TYPE $DRY_RUN_FLAG
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Deploy demo to GitHub Pages
  deploy-demo:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}

    - name: Install dependencies
      run: npm ci

    - name: Build demo for GitHub Pages
      run: npm run build:demo

    - name: Setup Pages
      uses: actions/configure-pages@v3

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: './dist/rm-ng-typeahead-main'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2
