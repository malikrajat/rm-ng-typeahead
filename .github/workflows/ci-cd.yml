name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  NODE_VERSION: '18.x'
  CACHE_VERSION: v1

jobs:
  # Quality Assurance
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Code Formatting Check
        run: npm run format:check

      - name: Lint Check
        run: npm run lint:ci

      - name: Security Audit
        run: npm run security:audit

  # Testing
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test:ci

      - name: Upload Coverage Reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/rm-ng-typeahead/lcov.info
          flags: unittests
          name: codecov-umbrella

  # Library Build
  build-library:
    name: Build Library
    runs-on: ubuntu-latest
    needs: [quality-check, test]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Library
        run: npm run build:lib:prod

      - name: Check Bundle Size
        run: npm run size:check
        continue-on-error: true

      - name: Upload Library Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: library-dist
          path: dist/rm-ng-typeahead/
          retention-days: 30

  # Demo Application Build
  build-demo:
    name: Build Demo App
    runs-on: ubuntu-latest
    needs: [quality-check, test]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Demo Application
        run: npm run build:demo

      - name: Upload Demo Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: demo-dist
          path: dist/rm-ng-typeahead-main/
          retention-days: 30

  # Performance Testing
  performance:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: build-demo
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Download Demo Artifacts
        uses: actions/download-artifact@v4
        with:
          name: demo-dist
          path: dist/rm-ng-typeahead-main/

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.12.x

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # Release to NPM
  release:
    name: Release to NPM
    runs-on: ubuntu-latest
    needs: [build-library, build-demo]
    if: github.event_name == 'release'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Download Library Artifacts
        uses: actions/download-artifact@v4
        with:
          name: library-dist
          path: dist/rm-ng-typeahead/

      - name: Publish to NPM
        run: cd dist/rm-ng-typeahead && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release Comment
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Package has been published to NPM successfully!'
            })
